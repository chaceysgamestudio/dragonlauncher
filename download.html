<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Download Launcher</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f14);
    color: white;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    max-width: 1000px;
    padding: 40px 20px;
  }

  .panel {
    display: flex;
    gap: 30px;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 25px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .left {
    width: 45%;
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: flex-start;
  }

  .right {
    width: 55%;
    text-align: center;
  }

  .download-btn {
    display: inline-block;
    padding: 14px 20px;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(108,92,231,0.3);
    transition: 0.2s;
  }

  .download-btn:hover {
    transform: translateY(-2px);
  }

  .exit-btn {
    margin-top: 10px;
    display: inline-block;
    padding: 10px 14px;
    background: rgba(255,255,255,0.08);
    color: white;
    text-decoration: none;
    border-radius: 10px;
  }

  .exit-btn:hover {
    background: rgba(255,255,255,0.15);
  }

  .dragon {
    width: 100%;
    max-width: 450px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  }

  .title {
    font-size: 34px;
    margin: 0;
  }

  .subtext {
    color: #b0b0b0;
  }

  @media (max-width: 800px) {
    .panel {
      flex-direction: column;
      text-align: center;
    }

    .left, .right {
      width: 100%;
      align-items: center;
    }
  }
</style>
</head>

<body>

<div class="container">

  <div class="panel">

    <div class="left">
      <h1 class="title">Download Half Dragon Launcher</h1>
      <p class="subtext">Get the latest version of the launcher and start playing.</p>

      <a class="download-btn"
         href="https://github.com/chaceysgamestudio/dragonlaunchercode/releases/download/launcher/half.dragon.launcher.exe">
        Download .EXE
      </a>

      <a class="exit-btn" href="index.html">Exit</a>
    </div>

    <div class="right">
      <img class="dragon" src="image/dragon_1200x1200.png" alt="dragon" />
    </div>

  </div>

</div>

</body>
</html>
