    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Half Dragon Launcher</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f14);
      color: white;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      padding: 40px 20px;
    }

    .layout {
      display: flex;
      gap: 30px;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .layout img {
      width: 55%;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transition: 0.3s;
    }

    .layout img:hover {
      transform: scale(1.02);
    }

    .content {
      width: 45%;
    }

    h1 {
      font-size: 44px;
      margin: 0 0 10px 0;
      letter-spacing: 1px;
    }

    .subtext {
      color: #b0b0b0;
      margin-bottom: 10px;
    }

    .warning {
      color: #ff4d4d;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(255,0,0,0.3);
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      box-shadow: 0 8px 20px rgba(108,92,231,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
    }

    @media (max-width: 800px) {
      .layout {
        flex-direction: column;
        text-align: center;
      }

      .layout img,
      .content {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="layout">

      <img src="image/screenshot_2026_05_16_105712.png" alt="launcher preview" />

      <div class="content">
        <h1>Half Dragon Launcher</h1>

        <p class="subtext">
          A project where we give Half Dragon its own launcher
        </p>

        <p class="warning">
          THIS IS NOT OFFICIAL
        </p>

        <div class="buttons">
          <a class="btn btn-primary" href="download.html">Download Launcher</a>
          <a class="btn btn-secondary" href="join.html">How do I join?</a>
        </div>
      </div>

    </div>

  </div>
</body>
</html>

  </div>
</body>
</html>
